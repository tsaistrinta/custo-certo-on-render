[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    bogde/HX711@^0.7.5

; =====================================================
; Configurações de runtime — sobrescreva sem editar o main.cpp
; =====================================================
; Ative o ambiente "prod" para apontar para o Render:
;   pio run -e prod -t upload
;
; Ative "dev" para apontar para um IP local:
;   pio run -e dev -t upload

build_flags =
    -DWIFI_SSID=\"AndroidAP\"
    -DWIFI_PASS=\"lucas1234\"
    -DSERVER_URL=\"https://custo-certo.onrender.com\"

[env:dev]
extends = env:esp32dev
build_flags =
    -DWIFI_SSID=\"AndroidAP\"
    -DWIFI_PASS=\"lucas1234\"
    -DSERVER_URL=\"http://192.168.0.11:3000\"

[env:prod]
extends = env:esp32dev
build_flags =
    -DWIFI_SSID=\"AndroidAP\"
    -DWIFI_PASS=\"lucas1234\"
    -DSERVER_URL=\"https://custo-certo.onrender.com\"